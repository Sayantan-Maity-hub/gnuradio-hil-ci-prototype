sig_source:
  tx_script: experiments/sig_source/tx.py
  rx_script: experiments/sig_source/rx.py
  analyze_script: experiments/sig_source/analyze.py

  metrics: [frequency_error, amplitude_error]

  thresholds:
    frequency_error: 1.0
    amplitude_error: 5.0

  input_options:
    # [waveform, frequency, amplitude, duration]
    - [sine,     1000, 1.0, 10]
    - [cosine,   2000, 0.8, 10]
    - [square,    500, 1.2, 10]
    - [triangle, 1500, 0.6, 10]

agc:
  tx_script: experiments/agc/tx.py
  rx_script: experiments/agc/rx.py
  analyze_script: experiments/agc/analyze.py

  metrics: [settling_time, output_power_stability, overshoot]

  thresholds:
    settling_time: 0.2
    output_power_stability: 0.1
    overshoot: 0.05

  input_format: [input_amplitude, gain_step, duration]

  input_options:
    - [0.1, 1.0, 8]
    - [0.5, 2.0, 8]
    - [1.0, 3.0, 8]